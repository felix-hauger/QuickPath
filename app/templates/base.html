<!DOCTYPE html>
<html lang="en">
<head>
    {% block head %}
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}" />
    <title>{% block title %}{% endblock %} - QuickPath</title>
    {% endblock %}
</head>
<body>
    <header class="header">
        <div class="container">
            <img class="header-logo" src="{{ url_for('static', path='img/quickpath_symbol_256.png') }}" alt="QuickPath Symbol">

            <hr class="header-break" />
        </div>
    </header>

    <main class="main">{% block maincontent %}{% endblock %}</main>

    <footer>
        {% block footer %}
        &copy; Copyright 2008 by <a href="http://domain.invalid/">you</a>.
        {% endblock %}
    </footer>

    {% block script %}{% endblock %}
</body>
</html>
